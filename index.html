<!DOCTYPE html>
<html>
<body>
  <h2>相機測試</h2>
  <div id="reader" style="width:300px;"></div>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script>
    const html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start(
      { facingMode: "environment" }, 
      { fps: 10, qrbox: 250 },
      (text) => alert("掃描到：" + text)
    ).catch(err => alert("出錯了：" + err));
  </script>
</body>
</html>
